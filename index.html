<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>BACS - L'Appli</title>
    <link rel="stylesheet" href="style.css">
    <!-- Intégration d'une police géométrique et pro via Google Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;700;900&display=swap" rel="stylesheet">
</head>
<body>

    <div class="app-container">
        
        <!-- Section Logo -->
        <header class="app-header">
            <!-- Icône géométrique du bac en SVG (propre et ultra-léger) -->
            <svg class="logo-icon" viewBox="0 0 100 100" xmlns="http://www.w3.org/2000/svg">
                <path d="M50 15 L85 32 L85 68 L50 85 L15 68 L15 32 Z" fill="none" stroke="#F4F1EA" stroke-width="6" stroke-linejoin="round"/>
                <path d="M15 32 L50 50 L85 32" fill="none" stroke="#F4F1EA" stroke-width="5" stroke-linejoin="round"/>
                <path d="M50 50 L50 85" fill="none" stroke="#F4F1EA" stroke-width="5"/>
                <path d="M30 24 L30 40 M70 24 L70 40" fill="none" stroke="#F4F1EA" stroke-width="4" stroke-linecap="round"/>
            </svg>
            <h1 class="logo-text">BACS</h1>
        </header>

        <!-- Section Action Principale -->
        <main class="app-main">
            <button class="btn-primary" onclick="startShopping()">
                FAIRE MES COURSES
            </button>
            <p class="tagline">Le magasin alimentaire en flux tendu</p>
        </main>

        <!-- Barre de navigation basse (style application) -->
        <footer class="app-footer">
            <div class="nav-item active">●</div>
            <div class="nav-item">🛒</div>
            <div class="nav-item">⚙️</div>
        </footer>

    </div>

    <script>
        // Fonction déclenchée lors du clic sur le bouton
        function startShopping() {
            alert("Lancement du parcours de courses BACS !");
            // C'est ici qu'on redirigera plus tard vers le scanner ou le catalogue
        }
    </script>
</body>
</html>
